name: Refresh Instagram token

on:
  schedule:
    # Monthly — long-lived tokens expire after 60 days
    - cron: "0 3 1 * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Refresh token and update repo secret
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Classic PAT with `repo` scope (or fine-grained with Secrets write),
          # stored as the GH_PAT secret. GITHUB_TOKEN cannot update secrets.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN=$(python src/refresh_token.py)
          gh secret set IG_ACCESS_TOKEN --repo "$GITHUB_REPOSITORY" --body "$NEW_TOKEN"
          echo "Token refreshed and secret updated."

name: Daily Instagram recipe post

on:
  schedule:
    # 8:00 AM IST (2:30 AM UTC) every day
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      format:
        description: "Force post format (reel or carousel); empty = random"
        required: false
        default: ""
      require_reel:
        description: "Test mode: fail the run if the reel can't be made (no carousel fallback, nothing posted)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # libfribidi lets Pillow's bundled raqm shape Telugu overlay text
      # (without it, conjuncts render broken and the hook falls back to
      # English — see ai_reel.assemble_reel)
      - name: Install text-shaping library
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libfribidi0

      - name: Generate recipe cards and caption
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVEN_LABS_API_KEY: ${{ secrets.ELEVEN_LABS_API_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          POST_FORMAT: ${{ inputs.format }}
          REQUIRE_REEL: ${{ inputs.require_reel == true && '1' || '' }}
          # Tunables — set under Settings -> Secrets and variables -> Variables
          IG_HANDLE: ${{ vars.IG_HANDLE }}
          REEL_SECONDS: ${{ vars.REEL_SECONDS }}
          SHOT_SECONDS: ${{ vars.SHOT_SECONDS }}
          REEL_PROBABILITY: ${{ vars.REEL_PROBABILITY }}
          VIDEO_BACKEND: ${{ vars.VIDEO_BACKEND }}
          KIE_RESOLUTION: ${{ vars.KIE_RESOLUTION }}
          KIE_SEEDANCE_MODEL: ${{ vars.KIE_SEEDANCE_MODEL }}
          VEO_MODEL: ${{ vars.VEO_MODEL }}
          SARVAM_SPEAKER: ${{ vars.SARVAM_SPEAKER }}
          ELEVEN_LABS_VOICE_ID: ${{ vars.ELEVEN_LABS_VOICE_ID }}
          ELEVEN_LABS_MODEL: ${{ vars.ELEVEN_LABS_MODEL }}
          REEL_CAPTIONS: ${{ vars.REEL_CAPTIONS }}
          REEL_MUSIC: ${{ vars.REEL_MUSIC }}
          REEL_SET: ${{ vars.REEL_SET }}
          REEL_QC: ${{ vars.REEL_QC }}
          REEL_GRADE: ${{ vars.REEL_GRADE }}
        run: python -u src/generate.py

      - name: Clean up old media (keep repo lean)
        run: python src/cleanup.py

      - name: Commit and push the image (Instagram needs a public URL)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A posts/ data/ recipes/
          git commit -m "Daily post $(TZ=Asia/Kolkata date +%F)"
          # Survive a moving main (mid-day PR merges, metrics/other workflows):
          # rebase our post commit onto the latest remote and retry, so the push
          # isn't rejected non-fast-forward and the day still publishes.
          for attempt in 1 2 3; do
            git push && exit 0
            echo "push rejected; rebasing onto origin/main (attempt $attempt)"
            git fetch --depth=100 origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          echo "push still failing after retries"; exit 1

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python src/publish.py

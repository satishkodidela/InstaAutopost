name: Daily Instagram recipe post

on:
  schedule:
    # 8:00 AM IST (2:30 AM UTC) every day — primary trigger
    - cron: "30 2 * * *"
    # 10:30 AM IST (5:00 AM UTC) — fallback if primary schedule is delayed by GitHub
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      format:
        description: "Force post format (reel or carousel); empty = random"
        required: false
        default: ""
      force:
        description: "Force a new post even if one was already published today"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate recipe cards and caption
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          POST_FORMAT: ${{ inputs.format }}
          FORCE_POST: ${{ inputs.force }}
          # Tunables — set under Settings -> Secrets and variables -> Variables
          IG_HANDLE: ${{ vars.IG_HANDLE }}
          REEL_SECONDS: ${{ vars.REEL_SECONDS }}
          SHOT_SECONDS: ${{ vars.SHOT_SECONDS }}
          REEL_PROBABILITY: ${{ vars.REEL_PROBABILITY }}
          KIE_RESOLUTION: ${{ vars.KIE_RESOLUTION }}
          KIE_SEEDANCE_MODEL: ${{ vars.KIE_SEEDANCE_MODEL }}
          SARVAM_SPEAKER: ${{ vars.SARVAM_SPEAKER }}
        run: python -u src/generate.py

      - name: Clean up old media (keep repo lean)
        run: python src/cleanup.py

      - name: Commit and push the image (Instagram needs a public URL)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A posts/ data/ recipes/
          git diff --cached --quiet || git commit -m "Daily post $(TZ=Asia/Kolkata date +%F)"
          git push

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FORCE_POST: ${{ inputs.force }}
        run: python src/publish.py

      - name: Record published status
        if: success()
        run: |
          git add data/history.json
          git diff --cached --quiet || git commit -m "Record published $(TZ=Asia/Kolkata date +%F)"
          git pull --rebase origin HEAD
          git push

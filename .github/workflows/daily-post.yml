name: Daily Instagram recipe post

on:
  schedule:
    # 7:30 PM IST (2:00 PM UTC) every day — evening peak for Indian audiences
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      format:
        description: "Force post format (reel or carousel); empty = random"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate recipe cards and caption
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          POST_FORMAT: ${{ inputs.format }}
        run: python -u src/generate.py

      - name: Commit and push the image (Instagram needs a public URL)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ data/
          git commit -m "Daily post $(TZ=Asia/Kolkata date +%F)"
          git push

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python src/publish.py
